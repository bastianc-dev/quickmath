<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quick Math</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Patrick+Hand&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ==========================
         MENÚ
    =========================== -->

    <div id="menuScreen" class="container">

        <h1 class="title">
            <span>Quick</span>
            <span>Math</span>
        </h1>

        <div class="menu-buttons">

            <button id="btnInfinite">
                Infinite
            </button>

            <button id="btnTimer">
                Timed
            </button>

            <button id="btnRecords">
                Records
            </button>

        </div>

        <section>

            <h2>Operation</h2>

            <div class="options">

                <label>
                    <input
                        type="radio"
                        name="operacion"
                        value="suma"
                        checked>

                    Addition
                </label>

                <label>
                    <input
                        type="radio"
                        name="operacion"
                        value="resta">

                    Subtraction
                </label>

                <label>
                    <input
                        type="radio"
                        name="operacion"
                        value="multiplicacion">

                    Multiplication
                </label>

                <label>
                    <input
                        type="radio"
                        name="operacion"
                        value="division">

                    Division
                </label>

            </div>

        </section>

        <section>

            <h2>Digits</h2>

            <div class="options">

                <label>

                    <input
                        type="radio"
                        name="cifras"
                        value="facil"
                        checked>

                    <span id="opcion1">
                        2 digits
                    </span>

                </label>

                <label>

                    <input
                        type="radio"
                        name="cifras"
                        value="dificil">

                    <span id="opcion2">
                        3 digits
                    </span>

                </label>

            </div>

        </section>

    </div>

    <div id="timerScreen" class="container" style="display:none;">

    <h2>Timed</h2>

    <section>

        <h2>Time</h2>

        <div class="menu-buttons">

            <button class="timeButton" data-time="60">
                1 minute
            </button>

            <button class="timeButton" data-time="180">
                3 minutes
            </button>

            <button class="timeButton" data-time="300">
                5 minutes
            </button>

        </div>

    </section>

    <button id="btnBackTimer" class="small-button">
        Back
    </button>

</div>

    <!-- ==========================
         JUEGO
    =========================== -->

    <div id="gameScreen" class="container" style="display:none;">

        <div class="game-info">

            <p id="gameInfoTitle" class="small-title">
                Average
            </p>

            <p id="gameInfoValue" class="small-value">
                0.00 s
            </p>

        </div>

        <div
            id="operation"
            class="operation">

            0 + 0

        </div>

        <input
            id="answer"
            class="answer"
            type="text"
            inputmode="numeric"
            autocomplete="off">

        <button id="btnStop" class="small-button">
            Stop
        </button>

    </div>

    <!-- ==========================
         RESUMEN
    =========================== -->

<div id="summaryScreen" class="container" style="display:none;">

    <h2>Summary</h2>

    <div class="summary">

        <p>Problems</p>
        <p id="summaryOperations">0</p>

        <br>

        <p>Average</p>
        <p id="summaryAverage">0.00 s</p>

    </div>

    <button id="btnMenu" class="small-button">
        Menu
    </button>

</div>

<div id="recordsScreen" class="container" style="display:none;">

    <h2>Records</h2>

    <div id="recordsList"></div>

    <button id="btnRecordsMenu" class="small-button">
        Menu
    </button>

    <button id="btnResetRecords" class="small-button">
        Reset Records
    </button>

</div>

</div>

    <div id="recordsScreen" class="container" style="display:none;">

    <h2>Records</h2>

    <div id="recordsList"></div>

    <button id="btnRecordsMenu">
        Menu
    </button>

</div>

    </div>

    <script src="main.js"></script>

</body>

</html>
