<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quick Math</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Patrick+Hand&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ==========================
         MENÚ
    =========================== -->

    <div id="menuScreen" class="container">

        <h1 class="title">
            <span>Quick</span>
            <span>Math</span>
        </h1>

        <div class="menu-buttons">

            <button id="btnInfinite">
                Infinito
            </button>

            <button id="btnTimer">
                Contrarreloj
            </button>

            <button id="btnRecords">
                Récords
            </button>

        </div>

        <section>

            <h2>Operación</h2>

            <div class="options">

                <label>
                    <input
                        type="radio"
                        name="operacion"
                        value="suma"
                        checked>

                    Suma
                </label>

                <label>
                    <input
                        type="radio"
                        name="operacion"
                        value="resta">

                    Resta
                </label>

                <label>
                    <input
                        type="radio"
                        name="operacion"
                        value="multiplicacion">

                    Multiplicación
                </label>

                <label>
                    <input
                        type="radio"
                        name="operacion"
                        value="division">

                    División
                </label>

            </div>

        </section>

        <section>

            <h2>Números</h2>

            <div class="options">

                <label>

                    <input
                        type="radio"
                        name="cifras"
                        value="facil"
                        checked>

                    <span id="opcion1">
                        2 cifras
                    </span>

                </label>

                <label>

                    <input
                        type="radio"
                        name="cifras"
                        value="dificil">

                    <span id="opcion2">
                        3 cifras
                    </span>

                </label>

            </div>

        </section>

        <section id="timeSection">

            <h2>Tiempo</h2>

            <div class="options">

                <label>

                    <input
                        type="radio"
                        name="time"
                        value="60"
                        checked>

                    1 min

                </label>

                <label>

                    <input
                        type="radio"
                        name="time"
                        value="180">

                    3 min

                </label>

                <label>

                    <input
                        type="radio"
                        name="time"
                        value="300">

                    5 min

                </label>

            </div>

        </section>

    </div>

    <!-- ==========================
         JUEGO
    =========================== -->

    <div id="gameScreen" class="container" style="display:none;">

        <div class="game-info">

            <p id="gameInfoTitle" class="small-title">
                Promedio
            </p>

            <p id="gameInfoValue" class="small-value">
                0.00 s
            </p>

        </div>

        <div
            id="operation"
            class="operation">

            0 + 0

        </div>

        <input
            id="answer"
            class="answer"
            type="text"
            inputmode="numeric"
            autocomplete="off">

        <button id="btnStop">
            Parar
        </button>

    </div>

    <!-- ==========================
         RESUMEN
    =========================== -->

<div id="summaryScreen" class="container" style="display:none;">

    <h2>Resumen</h2>

    <div class="summary">

        <p>Operaciones</p>
        <p id="summaryOperations">0</p>

        <br>

        <p>Promedio</p>
        <p id="summaryAverage">0.00 s</p>

    </div>

    <button id="btnMenu">
        Menú
    </button>

</div>

<div id="recordsScreen" class="container" style="display:none;">

    <h2>Récords</h2>

    <div id="recordsList"></div>

    <button id="btnRecordsMenu">
        Menú
    </button>

</div>

    <div id="recordsScreen" class="container" style="display:none;">

    <h2>Récords</h2>

    <div id="recordsList"></div>

    <button id="btnRecordsMenu">
        Menú
    </button>

</div>

    </div>

    <script src="main.js"></script>

</body>

</html>
