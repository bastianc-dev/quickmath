<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quick Math</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Patrick+Hand&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- =========================
         MAIN MENU
    ========================== -->

    <main id="menuScreen" class="container screen">

        <h1 class="title">
            <span>Quick</span>
            <span>Math</span>
        </h1>

        <div class="menu-buttons">
            <button id="btnInfinite" type="button">
                Infinite
            </button>

            <button id="btnTimer" type="button">
                Timed
            </button>

            <button id="btnRecords" type="button">
                Records
            </button>
        </div>

        <section>
            <h2>Operation</h2>

            <div class="options">
                <label>
                    <input
                        type="radio"
                        name="operacion"
                        value="suma"
                        checked>
                    Addition
                </label>

                <label>
                    <input
                        type="radio"
                        name="operacion"
                        value="resta">
                    Subtraction
                </label>

                <label>
                    <input
                        type="radio"
                        name="operacion"
                        value="multiplicacion">
                    Multiplication
                </label>

                <label>
                    <input
                        type="radio"
                        name="operacion"
                        value="division">
                    Division
                </label>
            </div>
        </section>

        <section>
            <h2>Digits</h2>

            <div class="options">
                <label>
                    <input
                        type="radio"
                        name="cifras"
                        value="facil"
                        checked>

                    <span id="opcion1">2 digits</span>
                </label>

                <label>
                    <input
                        type="radio"
                        name="cifras"
                        value="dificil">

                    <span id="opcion2">3 digits</span>
                </label>
            </div>
        </section>

    </main>

    <!-- =========================
         TIME SELECTION
    ========================== -->

    <section id="timerScreen" class="container screen" hidden>
        <h2 class="screen-title">Timed</h2>

        <p class="screen-description">
            Choose how long you want to play.
        </p>

        <div class="menu-buttons">
            <button type="button" data-time="60">
                1 minute
            </button>

            <button type="button" data-time="180">
                3 minutes
            </button>

            <button type="button" data-time="300">
                5 minutes
            </button>
        </div>

        <button id="btnBackTimer" class="small-button secondary-button" type="button">
            Back
        </button>
    </section>

    <!-- =========================
         GAME
    ========================== -->

    <section id="gameScreen" class="container screen" hidden>

        <div class="game-info">
            <p id="gameInfoTitle" class="small-title">
                Average
            </p>

            <p id="gameInfoValue" class="small-value">
                0.00 s
            </p>
        </div>

        <div
            id="operation"
            class="operation"
            aria-live="polite">
            0 + 0
        </div>

        <label class="visually-hidden" for="answer">
            Answer
        </label>

        <input
            id="answer"
            class="answer"
            type="text"
            inputmode="numeric"
            autocomplete="off"
            aria-label="Answer">

        <button id="btnStop" class="small-button" type="button">
            Stop
        </button>

    </section>

    <!-- =========================
         SUMMARY
    ========================== -->

    <section id="summaryScreen" class="container screen" hidden>
        <h2 class="screen-title">Summary</h2>

        <div class="summary">
            <p>Problems</p>
            <p id="summaryOperations" class="summary-value">0</p>

            <p>Average</p>
            <p id="summaryAverage" class="summary-value">0.00 s</p>

            <p id="summaryRecord" class="record-message" hidden>
                New record!
            </p>
        </div>

        <button id="btnMenu" class="small-button" type="button">
            Menu
        </button>
    </section>

    <!-- =========================
         RECORDS
    ========================== -->

    <section id="recordsScreen" class="container screen" hidden>
        <h2 class="screen-title">Records</h2>

        <div id="recordsList" aria-live="polite"></div>

        <div class="secondary-actions">
            <button id="btnRecordsMenu" class="small-button" type="button">
                Menu
            </button>

            <button id="btnResetRecords" class="small-button secondary-button" type="button">
                Reset Records
            </button>
        </div>
    </section>

    <script src="main.js"></script>

</body>

</html>
